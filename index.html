<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#9C5E12">
<title>Bee Field Guide</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bee Guide">
<style>
:root{
  --amber:#CE8A1E; --gold:#E6B23C; --deep:#9C5E12; --cream:#FBF4E1;
  --ink:#2a2017; --muted:#6f6151; --line:#e7dcc2; --card:#fffdf6; --bg:#f6efdc;
  --warn:#b3431b; --ok:#2f7d3b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.5;
  padding-bottom:env(safe-area-inset-bottom);
}
h1,h2,h3,.serif{font-family:"Iowan Old Style",Georgia,"Times New Roman",serif}
/* header */
header{
  position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#a9670f,#9C5E12);
  color:#fff;padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
  box-shadow:0 2px 10px rgba(0,0,0,.18)
}
.bar{display:flex;align-items:center;gap:10px}
.back{background:rgba(255,255,255,.16);border:0;color:#fff;font-size:20px;line-height:1;
  width:38px;height:38px;border-radius:10px;display:none;align-items:center;justify-content:center;cursor:pointer}
.back.show{display:flex}
.title{font-size:19px;font-weight:700;letter-spacing:.2px;flex:1;display:flex;align-items:center;gap:8px}
.title .hx{font-size:18px}
.search{margin-top:10px;position:relative}
.search input{
  width:100%;border:0;border-radius:12px;padding:12px 14px 12px 40px;font-size:16px;
  background:#fff;color:var(--ink);outline:none;box-shadow:inset 0 0 0 2px rgba(0,0,0,.04)
}
.search .mag{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5;font-size:16px}
.search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:#eee;
  border-radius:50%;width:24px;height:24px;cursor:pointer;display:none;color:#555}
.search .clr.show{display:block}
/* layout */
main{max-width:760px;margin:0 auto;padding:14px}
.hx{color:var(--gold)}
.muted{color:var(--muted)}
.lead{color:var(--muted);font-size:14px;margin:2px 0 14px}
/* home tiles */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{
  background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 14px;
  text-decoration:none;color:var(--ink);box-shadow:0 1px 0 rgba(0,0,0,.03);cursor:pointer;
  display:flex;flex-direction:column;gap:6px;min-height:108px;transition:transform .06s
}
.tile:active{transform:scale(.98)}
.tile .ic{font-size:26px}
.tile .nm{font-weight:700;font-size:16px}
.tile .sub{font-size:12.5px;color:var(--muted);line-height:1.35}
.tile.wide{grid-column:1 / -1;min-height:auto;flex-direction:row;align-items:center;gap:12px}
.tile.wide .ic{font-size:22px}
/* cards / sections */
.section-title{font-size:22px;font-weight:700;margin:6px 0 2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin:10px 0}
.card h3{margin:0 0 4px;font-size:17px}
.pill{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  padding:3px 8px;border-radius:999px;background:#f1e6c8;color:#7a5a14;margin-bottom:8px}
.kv{display:flex;gap:8px;font-size:14px;margin:5px 0}
.kv b{flex:0 0 96px;color:var(--muted);font-weight:600}
.warnbox{background:#fdeee6;border:1px solid #f3c9b3;color:#7a3412;border-radius:12px;padding:12px;
  font-size:13.5px;margin:10px 0}
.note{font-size:12.5px;color:var(--muted);margin-top:6px}
/* glossary */
.gitem{border-bottom:1px solid var(--line);padding:12px 4px;cursor:pointer}
.gitem:last-child{border-bottom:0}
.gterm{font-weight:700;font-size:16px;text-transform:capitalize}
.galias{font-size:12.5px;color:var(--muted);font-weight:400;text-transform:none}
.gdef{font-size:14px;color:#3a3026;margin-top:6px;display:none}
.gitem.open .gdef{display:block}
.gitem .chev{float:right;color:var(--amber);transition:transform .15s}
.gitem.open .chev{transform:rotate(90deg)}
.alpha{display:flex;flex-wrap:wrap;gap:5px;margin:4px 0 10px}
.alpha button{border:1px solid var(--line);background:#fff;color:var(--deep);width:30px;height:30px;
  border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}
.alpha button.on{background:var(--amber);color:#fff;border-color:var(--amber)}
/* checklist */
.chk{display:flex;gap:10px;align-items:flex-start;padding:9px 2px;border-bottom:1px solid var(--line);cursor:pointer}
.chk:last-child{border-bottom:0}
.box{flex:0 0 22px;height:22px;border:2px solid var(--amber);border-radius:6px;margin-top:1px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
.chk.done .box{background:var(--amber)}
.chk.done .txt{color:var(--muted);text-decoration:line-through}
.txt{font-size:14.5px}
.reset{float:right;font-size:12px;background:#fff;border:1px solid var(--line);border-radius:8px;
  padding:5px 10px;color:var(--muted);cursor:pointer}
/* search results */
.res-group{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
  margin:14px 0 4px;font-weight:700}
mark{background:#ffe8a3;color:inherit;border-radius:3px;padding:0 1px}
/* library */
.lib h3{margin:14px 0 6px;font-size:15px;color:var(--deep)}
.file{display:flex;gap:8px;align-items:center;background:var(--card);border:1px solid var(--line);
  border-radius:10px;padding:11px 12px;margin:6px 0;font-size:14px;text-decoration:none;color:var(--ink)}
.file:active{background:#fbf3df}
.file .fic{opacity:.6}
.empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px}
footer{max-width:760px;margin:8px auto 24px;padding:0 14px;color:var(--muted);font-size:11.5px;text-align:center}
a{color:var(--deep)}
.install{display:none;margin:10px 0;background:#fff7e3;border:1px dashed var(--amber);border-radius:12px;
  padding:12px;font-size:13px;color:#6b4e12}
.install.show{display:block}
</style>
</head>
<body>
<header>
  <div class="bar">
    <button class="back" id="back" aria-label="Back">‹</button>
    <div class="title"><span class="hx">⬡</span><span id="htitle">Bee Field Guide</span></div>
  </div>
  <div class="search">
    <span class="mag">⌕</span>
    <input id="q" type="search" placeholder="Search terms, diseases, treatments…" autocomplete="off" enterkeyhint="search">
    <button class="clr" id="clr" aria-label="Clear">×</button>
  </div>
</header>
<main id="app"></main>
<footer>
  Bee Field Guide · built from the Cornell Master Beekeeping course · for The Alleman Apiary.<br>
  Reference only — confirm treatments against current product labels and your state apiarist.
</footer>

<script>
window.DATA = {"glossary":[{"t":"abdomen","a":"","d":"The abdomen is one of three main body segments of insects (which also include the head and thorax). The abdomen contains the digestive and reproductive systems."},{"t":"absconding","a":"","d":"Absconding is the act of an entire honey bee colony leaving their nest or hive entirely. If mite levels or other disease or pest levels are too high, bees may leave their current location and search out another one. This can also be triggered by hive damage, repeated bear attacks, or other environmental problems."},{"t":"Acarine disease","a":"","d":"Acarine disease is the name of the condition given to a honey bee colony that is highly infested with tracheal mites."},{"t":"active (vegetative) infection","a":"","d":"A period in an infection’s lifecycle where it is proliferating. Symptoms can be present when infections are active."},{"t":"active ingredient","a":"","d":"The active ingredient of a pesticide is the chemical that kills the pest. It usually makes up a small proportion of the pesticide product."},{"t":"acute toxicity","a":"","d":"Acute toxicity determines the dose of a pesticide that is needed to kill a bee in a short time period (often 24 hrs, but could also be 48, 72, or 96 hours)."},{"t":"adaptive immunity","a":"","d":"Adaptive immunity includes the immune responses that are “learned” over time with exposure to different pathogens. The production of antibodies to respond to previously-encountered bacteria is one function of adaptive immunity."},{"t":"Africanized honey bee","a":"","d":"The Africanized honey bee, colloquially called the killer bee, is a hybrid of Apis mellifera scutellata (A), and Apis mellifera mellifera (M). These bees are known for their aggressive nature and sustained defense of their hives."},{"t":"afterswarm","a":"","d":"An afterswarm is a second, smaller swarm that can occur a few days following a colony’s first swarm."},{"t":"allogrooming","a":"","d":"Allogrooming is the social behavior whereby one bee grooms another bee."},{"t":"altruism","a":"","d":"Altruism, biologically speaking, is animal behavior that benefits another animal at the expense of the first, in terms of survival or reproduction. One of the most extreme examples of altruism in nature is worker bees that forgo their own reproduction in order to help the queen reproduce. See kin selection."},{"t":"American foulbrood","a":"","d":"American foulbrood is a highly infectious bacterial infection caused by the bacterium Paenibacillus larvae. It only infects brood."},{"t":"amino acid","a":"","d":"Amino acids are the building blocks of proteins. They are a significant part of bees’ (and humans’) diets, necessary for functioning and development. Pollen is the source of amino acids in bee bread and royal jelly."},{"t":"anaphylactic shock","a":"","d":"Anaphylactic shock is an extreme, life threatening allergic reaction."},{"t":"anther","a":"","d":"The anther is the part of a flower that contains pollen."},{"t":"apiary","a":"","d":"An apiary is a collection of one or more hives, also called a bee yard. Most backyard beekeepers have only one apiary, but commercial beekeepers may manage dozens."},{"t":"Apidae","a":"","d":"Apidae is a family classification of bees. It is the largest family of bees and includes honey bees, bumblebees, carpenter bees, and many others."},{"t":"Apis","a":"","d":"Apis is a genus classification of bees. It includes all bees that produce and store honey."},{"t":"Apis mellifera","a":"","d":"Apis mellifera is the scientific name for the Western honey bee. Apis is the genus and mellifera is the species. Mellifera means “bearer or maker of honey” (melli means “honey” and fera means “bearer”)."},{"t":"apitherapy","a":"","d":"Apitherapy is the use of honey bee hive products for health and medicinal benefits in humans."},{"t":"arthropods (Arthropoda)","a":"","d":"Arthropoda is one of the many phyla of the animal kingdom. Honey bees are in the phylum Arthropoda, and are therefore known as arthropods. All arthropods are invertebrates and have jointed bodies and paired jointed appendages."},{"t":"artificial queen insemination","a":"(also known as instrumental insemination)","d":"Artificial queen insemination is a method of controlled mating where semen from a drone is used to inseminate a queen."},{"t":"assessment","a":"","d":"See colony assessment."},{"t":"asymptomatic","a":"","d":"A disease that does not show any symptoms."},{"t":"autogrooming","a":"","d":"Autogrooming is the behavior of a bee grooming itself."},{"t":"bait hive","a":"","d":"A bait hive is a hive body or other box used to catch swarms."},{"t":"bee bread","a":"","d":"Bee bread is pollen that has been moistened by honey and honey bee glandular secretions and fermented by microorganisms such as yeast, bacteria, and fungi. Pollen in the form of bee bread is honey bees’ major source of protein, fats, and vitamins, and is an important nutrient source for the development of brood."},{"t":"bee space","a":"","d":"Bee space is 3/8”, which leaves enough room for bees to pass one another on opposite combs. If the space between combs is less than 3/8”, bees will likely fill it with propolis. It if is greater than 3/8”, the bees will tend to build burr comb to fill the space."},{"t":"bee yard","a":"","d":"See apiary."},{"t":"beeswax","a":"","d":"See wax."},{"t":"biosecurity","a":"","d":"Biosecurity is the procedures and management practices one can take to reduce the spread of pests and pathogens."},{"t":"brood","a":"","d":"Brood is the name given to the egg, larvae, and pupae stages of insects."},{"t":"brood nest","a":"","d":"The brood nest is the part of the hive where the brood is developing, distinct from the area where honey is being processed and stored. Conditions such as temperature are more important here for the healthy development of brood."},{"t":"brood pheromone","a":"","d":"Brood pheromone is released by larvae and indicates its sex, caste, and age. It influences development and behavior of other bees, most notably by inhibiting the development of ovaries in workers."},{"t":"burr comb","a":"","d":"Burr comb is comb built anywhere the beekeeper doesn’t want it, namely between frames or hive bodies. It is likely to be built in spaces with dimensions that exceed the width of bee space."},{"t":"candy board","a":"","d":"A candy board is a piece of hive equipment used to supplement carbohydrates to honey bee colonies during the winter. They resemble an inner cover filled with a solid candy made of sugar and water."},{"t":"carbohydrate","a":"","d":"Carbohydrates are the sugars in food that are a source of energy for organisms. Honey bees acquire their carbohydrates from nectar, honey, or sugar syrups."},{"t":"cast swarm","a":"","d":"See afterswarm."},{"t":"caste","a":"","d":"A caste is one form within a species that may differ from other forms in terms of anatomy, physiology, and reproduction. The three honey bee castes are queens, workers, and drones."},{"t":"cell builder","a":"","d":"A cell builder is a colony used to rear queens. Cell builders can be either \"cell starters\" or \"cell finishers.\" A cell builder consists of a strong population with many nurse bees, pollen, and honey or sugar syrup, and can be queenright or queenless."},{"t":"cell finisher","a":"","d":"A cell finisher is the cell building colony used to finish queen cells when rearing queens. Nurses in the finisher colony continue to provision the queen cells with royal jelly and complete the construction of the queen cell."},{"t":"cell starter","a":"","d":"A cell starter is the cell building colony used to start queen cells when rearing queens. Nurses in the starter colony provision the queen cells with ample royal jelly and begin building out the cell with wax."},{"t":"chalkbrood","a":"","d":"Chalkbrood is an infection in honey bee brood caused by the fungus Ascosphaera apis. It can affect both sealed and unsealed brood. Affected larvae often take the appearance of small white pieces of chalk and, in this stage, are referred to as \"chalkbrood mummies.\" checkerboarding Checkerboarding is the practice of alternating frames of drawn comb with frames that are already filled in the broodnest. This provides the colony more space to fill with brood and resources and, as a result, can help prevent swarming."},{"t":"chromosome","a":"","d":"Chromosomes are the structures containing an organism’s genetic material in the form of DNA."},{"t":"chronic toxicity","a":"","d":"The chronic toxicity of a pesticide is the dose that results in adverse effects after long-term exposure (longer than 4 days)."},{"t":"citizen science","a":"","d":"Citizen science is the process of citizens collecting and submitting scientific data. The resulting research project is a collaborative effort between the public and scientists."},{"t":"class","a":"","d":"Class is a rank in the classification of life, below phylum and above order. Honey bees are members of the class Insecta (insects)."},{"t":"cleansing flights","a":"","d":"A cleansing flight is the delicate name given to the act of leaving the hive to defecate. Bees can delay defecation for months during winter, but will leave the hive on a warm day to void their waste. Fecal staining may be evident around or on the outside of hives in winter and early spring."},{"t":"Clostridium botulinum","a":"","d":"Clostridium botulinum is a bacterium that produces a neurotoxin causing paralysis and death. The toxin can cause botulism infection."},{"t":"cluster","a":"(also winter cluster)","d":"Clustering is a thermoregulatory behavior where bees congregate on the comb to keep warm when environmental temperatures are below 64°F. Colony functions such as foraging and water collection cease when bees are clustering."},{"t":"cocoon","a":"","d":"A cocoon is a silky pupal casing spun by insect larvae to protect them during their pupal stage."},{"t":"colony","a":"","d":"The colony is the family community of honey bees that share a nest. There is usually a queen, many workers, and fewer drones."},{"t":"colony assessment","a":"","d":"A detailed colony inspection that quantifies the amount of brood, adults, honey, pollen, and comb in an effort to assess the growth and productivity of the colony."},{"t":"Colony Collapse Disorder","a":"","d":"Colony Collapse Disorder is the mysterious phenomenon of large-scale, unexplained, sudden colony deaths. This disorder has a specific set of criteria that differentiate it from other, more common causes of colony death."},{"t":"comb","a":"","d":"See honeycomb."},{"t":"Complementary Sex Determination gene","a":"","d":"The Complementary Sex Determination gene is responsible for sex determination in honey bees."},{"t":"compound eye","a":"","d":"The two large eyes found on either side of a bee’s head. Each compound eye consists of thousands of individual independent facets with lenses that collectively form a coherent image."},{"t":"congeners","a":"","d":"Congeners are compounds other than alcohol and carbon dioxide that yeast produce during fermentation of mead. Congeners can affect flavor, mouth feel, color, and overall complexity of the mead."},{"t":"cooperative brood care","a":"","d":"Cooperative brood care is the practice of sharing the work of raising young that is not one’s own. In the case of honey bees, the queen lays the eggs, but the larvae, pupae, and young adults are cooperatively cared for by their older sisters, nurse bees. Cooperative brood care is one of the three hallmarks of eusociality."},{"t":"corbicula","a":"(plural: corbiculae)","d":"See pollen basket."},{"t":"control group","a":"","d":"A control group is the group of test subjects in an experiment that do not receive a treatment. This group represents the normal state of the test subjects and is used as a comparison group when treatment results are evaluated."},{"t":"crop","a":"","d":"See honey crop."},{"t":"crystallization","a":"","d":"Crystallization is the formation of glucose crystals in honey."},{"t":"cuticular hydrocarbons","a":"","d":"Cuticular hydrocarbons are the blend of oils that are secreted from a bee’s cuticle. Cuticular hydrocarbons serve as cues for bees to distinguish their nest mates from unrelated bees. They also protect the cuticle from water and keep internal moisture from escaping."},{"t":"dearth","a":"","d":"A dearth is a period of time when flowers in a given region are not producing much nectar (in the case of a nectar dearth) or pollen (in the place of a pollen dearth)."},{"t":"diploid organism","a":"","d":"Diploid organisms have paired sets of chromosomes in each cell (excluding sperm and egg cells). They inherit one set of chromosomes from their mother and one from their father. Female honey bees (both queens and workers) are diploid, because they develop from eggs that are fertilized (by sperm) and therefore contain two sets of chromosomes; in contrast, drones are haploid. See also haplodiploid."},{"t":"DNA (deoxyribonucleic acid)","a":"","d":"DNA is the long molecule that carries an organism’s complete set of genetic information."},{"t":"Doolittle method","a":"","d":"A method of queen rearing where larvae is grafted and placed into artificial cups. These cups are then inserted into colonies that have been prepared in advance to readily rear queens."},{"t":"drift","a":"","d":"Drift is the entering of bees into hives or nests that are not their homes. It is more likely when hives are close together and difficult to distinguish from one another. Hives at the end of a row of hives may contain a lot of drifting bees."},{"t":"drone","a":"","d":"A drone is a male honey bee."},{"t":"drone comb","a":"","d":"Drone comb is specialized brood cells where unfertilized eggs are laid and reared into drones. The cell size is slightly–but obviously–bigger than that of worker comb and it is often built on the margins of frames."},{"t":"drone comb frame","a":"","d":"A drone comb frame is a Langstroth frame with a blueprint for drone-sized cells. Drone comb frames are used in drone-rearing colonies and as a cultural method to reduce Varroa mite populations."},{"t":"drone congregation area","a":"","d":"A drone congregation area is where hundreds of drones congregate high in the air to wait for a virgin queen on her mating flight."},{"t":"drone mother colony","a":"","d":"A drone mother colony is the colony that contains the drones that will be used to inseminate queens for queen rearing. The drone mother colony is usually chosen based on specific criteria. Frames of drone comb foundation are often placed in these colonies to rear a maximum amount of drones to saturate a drone congregation area."},{"t":"Dufour’s gland","a":"","d":"The Dufour’s gland is located at the end of the abdomen in female bees and releases pheromones through the vagina. In the queen, these pheromones have a similar role to queen mandibular pheromone, serving as a signal of her fertility and promoting retinue behavior. When a colony loses its queen, laying workers may start producing their own queen-like fertility pheromones from their Dufour’s glands."},{"t":"dysentery","a":"","d":"Dysentery is honey bee diarrhea, which may be visible inside or outside of the hive. It is caused by the build-up of solids in the digestive tract, and can relate to infections."},{"t":"egg","a":"","d":"Eggs are the first stage of the bee’s life, and are laid by queens, and sometimes workers, into cells. The pattern of egg-laying in the cells and across the comb can provide information about the health and trajectory of the colony."},{"t":"emergency queen cells","a":"","d":"Emergency queen cells are built when workers abruptly find themselves without a queen and must convert larvae that had been destined to be workers into queens instead."},{"t":"EpiPen","a":"","d":"An EpiPen is a brand name for an epinephrine injector. Epinephrine is used to treat anaphylactic shock."},{"t":"European foulbrood","a":"","d":"European foulbrood is a brood infection in honey bees caused by the bacteria Melissococcus plutonius."},{"t":"eusociality","a":"(adjective: eusocial)","d":"Eusociality refers to the most advanced form of social living. Eusocial individuals fully depend on a societal organization to survive and cannot live on their own. The defining characteristics of a eusocial organism are more than one generation living together, cooperative brood care, and a reproductive division of labor."},{"t":"extractor","a":"","d":"An extractor is a device that removes honey from the frame using centrifugal force. Tangential extractors will remove honey from one side of the frame at a time. Radial extractors can remove honey from both sides of the frame simultaneously. The frames are loaded into this extractor like the spokes of a wheel. Parallel radial extractors also remove honey from both sides of the frame at once, but they allow frames to be loaded in a parallel fashion, reducing the handling time by the beekeeper."},{"t":"exoskeleton","a":"","d":"An exoskeleton is an organism’s outer body shell, made of tough, protective material. All invertebrates have an exoskeleton and do not develop a backbone."},{"t":"family","a":"","d":"Family is a rank in the classification of life, below order and above genus. Honey bees are members of the family Apidae."},{"t":"fat body","a":"","d":"The fat body is a collection of tissues distributed throughout an insect’s body. It mostly surrounds the gut and reproductive organs, but is also distributed throughout the thorax and head. Its main function is to store fat and glycogen to release energy for use in times of food shortage. It also produces vitellogenin. Winter bees have a larger fat body and more numerous fat body cells than summer bees."},{"t":"fermented honey","a":"","d":"Fermented honey is honey that has been fermented by yeast. It is often bubbly or foamy in appearance and has a yeasty aroma. Fermentation most likely occurs naturally when the moisture content in honey exceeds 18%. Under these conditions, yeast populations can rise."},{"t":"festooning","a":"","d":"Festooning is when inactive bees hang between combs, linking themselves together by their legs. It is associated with wax construction."},{"t":"field bees","a":"","d":"See foragers."},{"t":"filtering","a":"","d":"Filtering is the process of removing nearly all wax, pollen, debris, and other particles from honey by passing it through a filter (usually containing diatomaceous earth). Filtering removes more particles from honey than does straining."},{"t":"fondant","a":"","d":"Fondant is a thick frosting-textured food product that is used to supplement carbohydrates to honey bee colonies during the winter. It is made of sugar, water, and corn syrup."},{"t":"forage","a":"","d":"Foraging is the search for and collection of resources (nectar, pollen, water, and resin) for the colony."},{"t":"foragers","a":"","d":"Foragers (also known as field bees) are worker bees that take foraging trips for nectar, pollen, water, or resin. Typically, worker bees begin foraging halfway through their lives, and remain foragers until they die. Foragers specialize in collecting one kind of resource, but they can be flexible as needed. See also house bees and nurse bees."},{"t":"fungicide","a":"","d":"A fungicide is a type of pesticide targeted to kill fungus pests."},{"t":"ganglia","a":"(singular: ganglion)","d":"Ganglia are nerve centers in the thorax and abdomen that constitute the nervous system. In the honey bee, ganglia control muscle movements more than the brain does."},{"t":"genome","a":"","d":"A genome is an organism’s complete set of genetic material carried by DNA. The genome includes information for a variety of elements, the most important being genes."},{"t":"genes","a":"","d":"Genes are the working subunits of DNA and are the basic unit of heredity, passed down to an individual’s offspring through reproduction. Genes act as instructions to make proteins and other molecules."},{"t":"genetic diversity","a":"","d":"Genetic diversity is the presence of many different gene versions in a population (in this course, a honey bee colony). High genetic diversity in a honey bee colony is the result of the queen mating with many different drones. High genetic diversity provides the colony with the ability to adapt to changing environments or pressures."},{"t":"genus","a":"","d":"Genus is a rank in the classification of life, below family and above species. Honey bees are members of the genus Apis. Genus names are always italicized."},{"t":"gland","a":"","d":"Glands are honey bees’ organs that secrete chemical substances. See Dufour’s gland, hypopharyngeal gland, mandibular gland, Nasonov gland, and wax gland."},{"t":"glucose oxidase","a":"","d":"Glucose oxidase is an enzyme added to nectar by honey bees. It converts glucose into gluconic acid and hydrogen peroxide during honey ripening."},{"t":"Grafting frame","a":"","d":"The grafting frame is the frame of grafted queen cells that will be placed in cell builder colonies for queen rearing using the Doolittle method. Grafting frames often hold three bars, each containing 15 queen cups."},{"t":"grafting tool","a":"","d":"A handheld tool used to scoop larvae out of brood cells and place them into artificial queen cups during the grafting process of the Doolittle method of queen rearing."},{"t":"grease patty","a":"","d":"A grease patty is a mixture of vegetable oil and powdered sugar placed on top of the brood nest as a control method for tracheal mites."},{"t":"hamuli","a":"(singular: hamulus)","d":"Hamuli are hooks that connect the pair of wings on each side of a bee while it is flying, giving the appearance of honey bees having only two wings instead of four."},{"t":"Haplodiploid organisms","a":"(noun: haplodiploidy)","d":"Honey bees as a species are haplodiploid. Males, or drones, are haploid organisms, meaning each of their cells possesses a single set of chromosomes inherited from their mother. Females are diploid organisms, meaning each of their cells (excluding sperm and eggs) possesses two sets of chromosomes (one inherited from their mother and one from their father)."},{"t":"Haploid organisms","a":"","d":"Male honey bees are haploid organisms, meaning each of their cells possesses a single set of chromosomes inherited from their mother. See haplodiploid organisms."},{"t":"heater bees","a":"","d":"Heater bees generate heat in the brood nest to ensure that pupae are incubated at the proper temperature (91-97°F, or 33-36°C)."},{"t":"hemacytometer","a":"","d":"A hemacytometer is a device used to count Nosema spores to quantify the degree of infection in a colony."},{"t":"hemolymph","a":"","d":"Hemolymph is analogous to blood in the honey bee. It circulates freely through the bees’ bodies, rather than being confined to arteries, capillaries, and veins as in the human body."},{"t":"herbicide","a":"","d":"A herbicide is a type of pesticide targeted to kill plant pests."},{"t":"high fructose corn syrup","a":"","d":"High fructose corn syrup is a liquid sweetener made from cornstarch that is sometimes fed to honey bee colonies as a carbohydrate supplement."},{"t":"hindgut","a":"","d":"The honey bee hindgut is the posterior part of the digestive system where waste is stored for eventual excretion through the rectum. It also contains waste filtered from the hemolymph by Malpighian tubules."},{"t":"hive","a":"","d":"The hive is a physical, manmade structure that houses a colony of bees and their nest of brood and food. The word “hive” is often mistakenly used interchangeably with “colony,” but it should be distinguished between the bees and their physical home."},{"t":"hive stocking rate","a":"","d":"The hive stocking rate of a crop is the number of hives required per portion of cropland to result in sufficient pollination of that crop."},{"t":"honey","a":"","d":"Honey is the sugary food substance that honey bees produce from concentrating and chemically converting nectar. Water is evaporated from the nectar until the water content is approximately 17-19%, and enzymes and bacteria are added to break down sucrose in nectar into fructose and glucose. When this process is complete, the nectar has been converted into honey. The bees cap the cells of honey with wax for storage."},{"t":"honey bound","a":"(alternate spelling: honeybound)","d":"A honey bound colony has nectar and honey filling the cells in the brood nest, restricting the area in which the queen can lay eggs."},{"t":"honeycomb","a":"","d":"Honeycomb is a series of wax cells constructed by honey bees for storing honey, pollen, and brood."},{"t":"honey crop","a":"","d":"The honey crop (also called a honey stomach) is a specialized part of the gut that stores nectar, honey, or water. A valve called the proventriculus at the base of the crop prevents nectar or water that a forager has collected from moving into the ventriculus and being digested."},{"t":"honeydew","a":"","d":"Honeydew is the sugary excrement of aphids."},{"t":"honey flow","a":"","d":"See nectar flow."},{"t":"honey stomach","a":"","d":"See honey crop."},{"t":"hormones","a":"","d":"Hormones are chemicals secreted into hemolymph and carried to specific organs and tissues to influence how they function. Unlike pheromones, hormones do not leave the body. In the honey bee, as in humans, hormones are involved in reproduction, development, and the general functioning of the body."},{"t":"hot room","a":"","d":"The hot room is the area in a honey house that is a temperature of 80 - 90 °F, with relative humidity between 0 - 20%. The purpose of a hot room is to warm the honey to make it more viscous and easy to extract. If the honey moisture content is too high, the hot room can also help reduce the water content before the supers are sent to the extractors."},{"t":"house bees","a":"","d":"House bees are worker bees that perform necessary tasks inside the hive, such as tending to brood or the queen (when they are known as nurse bees, or the queen’s retinue, respectively)."},{"t":"hygienic behavior","a":"","d":"Hygienic behavior is a trait where workers are able to detect, uncap, chew down and/or remove infected or parasitized pupae. It is a mechanism of social immunity to help reduce the spread of pathogens."},{"t":"Hymenoptera","a":"","d":"Hymenoptera is an order classification of insects. Hymenoptera includes ants, bees, and wasps. They typically have four membranous wings joined together by small hooks (hamuli). They are also the biggest-brained insects. Within Hymenoptera, there are nine families of bees."},{"t":"hypopharyngeal glands","a":"","d":"Hypopharyngeal glands are located in the heads of nurse bees, where they produce and secrete royal jelly to feed larvae."},{"t":"idiopathic brood disease","a":"","d":"Idiopathic brood disease is a mysterious syndrome where larvae display similar symptoms to parasitic mite syndrome, European foulbrood, or American foulbrood, yet none of these disease agents are the cause."},{"t":"inactive (latent) infection","a":"","d":"A period in an infection’s lifecycle where it is not proliferating. Symptoms are not usually present when infections are inactive."},{"t":"inert ingredient","a":"","d":"The inert ingredients of a pesticide product are the ingredients other than the active ingredients. They are various chemicals that help deliver the pesticide and help increase the efficacy of the pesticide when applied to a plant or soil. Inert ingredients make up the majority of a pesticide product, and can include adjuvants, surfactants, and other ingredients."},{"t":"inbred (inbreeding)","a":"","d":"Inbreeding is the production of offspring from closely related individuals. An inbred population has a limited number of genes; the probability of deleterious traits that are typically rare usually rise. For this reason, an inbred population may die out when faced with new selection pressures."},{"t":"innate immunity","a":"","d":"Innate immunity includes the immune responses that are consistently present across the life of an organism."},{"t":"insect","a":"","d":"Insects are invertebrate animals within the class Insecta. They have three main body parts (head, thorax, and abdomen), three pairs of legs, and one or two pairs of wings."},{"t":"insecticide","a":"","d":"An insecticide is a type of pesticide targeted to kill insect pests."},{"t":"instrumental insemination","a":"","d":"See artificial queen insemination."},{"t":"Integrated Pest Management","a":"","d":"Integrated Pest Management is the approach to managing pests and parasites by incorporating a variety of genetic, cultural, and chemical tools. Certain tools are only used when pests or parasites reach a specific threshold. Integrated Pest Management aims to reduce the risks to honey bee, human, and environmental health."},{"t":"invertase","a":"","d":"Invertase is an enzyme added by honey bees to nectar during the honey ripening process. It breaks down large sucrose molecules into the smaller sugars glucose and fructose."},{"t":"invertebrates","a":"","d":"Invertebrates do not develop a backbone and instead have an exoskeleton, or an outer body shell made of tough, protective material. All arthropods are invertebrates."},{"t":"isolated mating yard","a":"","d":"An isolated mating yard is a mating yard isolated by at least nine miles from other honey bee colonies. Isolated mating yards are often present in mountain valleys or on islands. These yards are used for controlled mating, as they ensure the queens placed in this area only mate with drones in the area."},{"t":"juvenile hormone","a":"","d":"Juvenile hormone is a hormone found in all insects and it plays an important role in honey bee caste determination and worker polyethism."},{"t":"kin selection","a":"","d":"Kin selection is the evolutionary strategy that favors the reproductive success of an individual’s relatives at the cost to the individual’s own reproduction and survival."},{"t":"kingdom","a":"","d":"Kingdom is the highest rank in the classification of life. Life classifies into five kingdoms: animals, plants, fungi, bacteria, and archaea. Honey bees are members of the animal kingdom."},{"t":"larva","a":"(plural: larvae)","d":"The larva is the developmental phase of an insect after it has hatched from an egg but before it has become a pupa. A larva’s main function is to eat and grow. All honey bee castes spend an average of six days as larvae."},{"t":"laying worker","a":"","d":"A laying worker is a worker honey bee that lays eggs. This can happen when the queen has died or is no longer producing high levels of queen pheromone. There are sometimes laying workers in queenright hives as well. Laying workers’ offspring are drones because their eggs are not fertilized."},{"t":"LC50 (the Lethal Concentration 50)","a":"","d":"The LC50 of a pesticide is the concentration that kills half a honey bee population in a short period of time (often 24 hours)."},{"t":"LD50 (the Lethal Dose 50)","a":"","d":"The LD50 of a pesticide is the dose that kills half a honey bee population in a short period of time (often 24 hours)."},{"t":"light polarization","a":"","d":"See polarized light."},{"t":"lineage","a":"","d":"A lineage is a group of organisms (in the case of honey bees it is a group of subspecies) that is genetically distinct from other lineages. Lineages differ in their geographical range, their behaviors, and their morphology (size, shape, color, etc.). All subspecies within the lineage descended from the same common ancestor. There are four lineages of honey bees: African (A), western and northern European (M), eastern European (C), and near Eastern and central Asian (O)."},{"t":"lipids","a":"","d":"Lipids are a class of molecules that are important for life. They include fats, sterols, and fat-soluble vitamins. Honey bees acquire lipids from pollen in their diet."},{"t":"locally adapted","a":"","d":"The term \"locally adapted\" refers to an organism that has adjusted to become well-suited to their specific environment."},{"t":"Malpighian tubules","a":"","d":"Malpighian tubules are slender, tube-shaped organs that comprise part of the excretory system in insects. In honey bees, approximately one hundred Malpighian tubules filter waste from the hemolymph and drain it into the hindgut. Their function is analogous to that of kidneys in humans."},{"t":"mandibles","a":"","d":"Mandibles are jaws. Foragers use their mandibles to collect pollen, and honey bees defending their hive may use their mandibles to bite insect invaders."},{"t":"mandibular gland","a":"","d":"The mandibular glands are located near the mouth and secrete pheromones. In the queen, they secrete queen pheromone; in workers, they secrete an alarm pheromone."},{"t":"mating flight","a":"","d":"When a virgin queen is sexually mature, she takes 1 - 3 mating flights to a drone congregation area far from her colony, where she mates with an average of twelve drones. Mating flights (and swarms) are the only time a queen leaves the hive."},{"t":"mating nuc","a":"","d":"Mating nucs are nucleus colonies that allow queens to emerge from their cells and mate with drones. They are small in size to allow the easy identification and capture of queens. Mating nucs are used when rearing queens."},{"t":"mating sign","a":"","d":"A mating sign is the tip of a drone’s penis that remains in the queen after they have mated. When a drone mates, ejaculation ruptures his penis and he falls away and dies. The mating sign of the last drone may remain in the queen when she returns to her colony."},{"t":"mating yard","a":"","d":"A mating yard is an apiary filled with mating nucs that allow queens to emerge from their cells and mate with drones. Mating yards are used when rearing queens."},{"t":"mead","a":"","d":"Mead is an alcoholic beverage created by fermenting honey with water and other ingredients."},{"t":"metamorphosis","a":"","d":"Metamorphosis is the conspicuous transformation of an organism’s body structure from an immature stage (a larva) to an adult stage (an adult bee)."},{"t":"microbiome","a":"","d":"The microbiome is the collective community of beneficial bacteria and yeasts that live in an organism’s gut."},{"t":"midgut","a":"","d":"The midgut of the honey bee is a portion of the digestive system that contains the ventriculus (analogous to a human stomach), where food is digested and nutrients are absorbed."},{"t":"minerals","a":"","d":"Minerals are naturally occurring substances, and many are necessary for life. Some minerals important in nutrition include sodium, potassium, phosphorus, and magnesium."},{"t":"miticide","a":"","d":"A miticide is a type of pesticide targeted to kill mites. There are a variety of miticides on the market available to kill Varroa mites and tracheal mites."},{"t":"monofloral honey","a":"","d":"Monofloral honey is made from nectar predominantly from one plant. Each type of monofloral honey is unique in flavor, color, and other physical and nutritional attributes."},{"t":"mushroom body","a":"","d":"The mushroom body is the part of the bee’s brain in which sensory information is processed, interpreted, and remembered."},{"t":"Nasonov gland","a":"","d":"The Nasonov gland is an organ located near the end of a worker’s abdomen that produces and secretes Nasonov pheromone."},{"t":"Nasonov pheromone","a":"","d":"Nasonov pheromone is released by worker bees to orient and aggregate their nestmates. They use it to mark the nest entry to assist returning bees, aggregate during swarming, and mark a water source."},{"t":"nectar","a":"","d":"Nectar is a carbohydrate-rich liquid produced by plants. Bees collect nectar from flowers and turn it into honey. There is great variation in the quality and quantity of nectar in different plants, and in the same plants at different times."},{"t":"nectar flow","a":"(also known as a honey flow)","d":"A nectar flow is a regionally specific time period when particular plants are flowering and secreting a large quantity of nectar, e.g., basswood trees or goldenrod."},{"t":"neonicotinoids","a":"","d":"Neonicotinoids are a class of insecticides, and are the most widely used insecticides in the world. They act by binding to acetylcholine receptors in insect neurons, causing them to rapidly fire."},{"t":"Nosema apis","a":"","d":"Nosema apis is a fungal gut parasite that infects honey bees. It has been infecting honey bees for over one hundred years. One of the symptoms observed with this disease is dysentery."},{"t":"Nosema ceranae","a":"","d":"Nosema ceranae is a fungal gut parasite that infects honey bees and bumble bees. It is a relatively recently introduced species to North America from Asia and it elicits different symptoms than the historical species, Nosema apis."},{"t":"nuc","a":"(also known as a nucleus colony)","d":"Nucs are small colonies contained in small hive bodies with only 2–5 frames. Nucs are created by pulling frames and bees from larger colonies."},{"t":"nurse bee","a":"","d":"Nurse bees are young house bees that feed and tend to brood."},{"t":"ocelli","a":"(singular: ocellus)","d":"The ocelli are three eyes arranged in a triangle pattern near the top of a bee's head that can detect light intensity. Ocelli cannot form an image."},{"t":"olfaction","a":"","d":"Olfaction is the sense of smell. The ability to smell the complex odors of flowers and pheromones is critical to honey bee communication, reproduction, behavior, and foraging."},{"t":"open mating","a":"","d":"Open mating refers to the natural mating process of honey bees, wherein queens mate with 10–20 adult drones in drone congregation areas. Most beekeepers rely on open mating for their breeding programs, but there is no guarantee that their queens will mate with drones of their desired stock."},{"t":"order","a":"","d":"Order is a rank in the classification of life, below class and above family. Honey bees are members of the order Hymenoptera."},{"t":"orientation flight","a":"","d":"Honey bees’ first journeys from the nest are brief orientation flights to learn their immediate surroundings and nest location. Such flights may also be necessary after a hive has been moved to a new location."},{"t":"ovarioles","a":"","d":"The ovarioles are the tube-like tissues where eggs are produced in the queen’s ovaries. Each of the queen’s two ovaries is comprised of 150–180 ovarioles, while each of the worker’s ovaries have only 2–12 ovarioles."},{"t":"ovary","a":"","d":"Ovaries are a pair of reproductive glands in which eggs are produced. Queens’ ovaries are much larger and contain many more ovarioles than workers’."},{"t":"oviduct","a":"","d":"The oviduct is the tube through which an egg passes from an ovary into the vagina."},{"t":"ovipositor","a":"","d":"For most insects, the ovipositor is an egg-laying organ. In honey bees and other Hymenoptera insects, however, it has adapted to become a stinger. Because of this, only female bees can sting."},{"t":"pasteurizing","a":"","d":"Pasteurizing is the process of heating honey to kill microorganisms (most notably yeast) and to prolong crystallization. It involves raising the temperature to 145 - 155°F (63 - 68°C), then holding that temperature for 30 minutes. Pasteurizing with flash heating involves bringing the honey to 160°F (71°C), then immediately cooling it."},{"t":"pathogen","a":"","d":"A pathogen is a microorganism (bacteria, virus, etc.) that can cause disease."},{"t":"peer review","a":"","d":"Peer review is a process where a research article is read by at least two experts in the field and comments are returned to the authors for improvement of the paper before it is published. Through this process, inferior academic work is culled, and readers who are not experts can trust that the published research represents the highest standards and best experimental approach available."},{"t":"pesticide","a":"","d":"A pesticide is a chemical targeted to kill pests. Some examples of pesticides include miticides, insecticides, fungicides, and herbicides."},{"t":"pheromone","a":"","d":"A pheromone is a chemical produced by specialized glands secreted outside of the body to elicit a behavioral or physiological response by another individual of the same species (in contrast to hormones that are secreted inside the body). Pheromones can be detected through smell or taste. Pheromone production differs from caste to caste and changes over the course of a bee’s lifetime."},{"t":"phorid fly","a":"","d":"A phorid fly is a fly that belongs to the family Phoridae. One species parasitizes honey bees by laying eggs in the bodies of adult bees. Parasitism by this fly results in the bees behaving strangely, earning them the name “zombees.” phylum (plural: phyla) Phylum is a rank in the classification of life, below kingdom and above order. Honey bees are members of the phylum Arthropoda."},{"t":"polarized light","a":"","d":"Polarized light is made of electromagnetic waves that are all vibrating in the same direction. Although humans cannot see it without aid, the sun produces polarized light (even through clouds), which bees can see and use to navigate while foraging."},{"t":"pollen","a":"","d":"Pollen granules are the male gametes of a plant, analogous to sperm in animals. Pollen is an important food source for bees and provides them with protein, vitamins, minerals, and fats. Foragers generally collect pollen from a single kind of flower at a time, which promotes effective flower pollination, but overall the hive collects pollen from multiple kinds of flowers."},{"t":"pollen basket","a":"(also known as corbicula)","d":"Pollen baskets are on the hind legs of honey bees. A forager uses the pollen combs on her legs to comb off pollen stuck to her body hairs and pack it into a colorful pellet in the pollen baskets. Pollen baskets can also be packed with resin to make propolis."},{"t":"pollen comb","a":"","d":"Pollen combs are structures on worker bees’ legs used to move pollen stuck to foragers’ body hairs and pack it into a colorful pellet in their pollen baskets."},{"t":"pollen substitute","a":"","d":"A pollen substitute is a food product that is fed to honey bees to provide them with protein. Pollen substitutes contain no pollen and are commonly made using soy flour, skim milk powder, or dried brewer’s yeast."},{"t":"pollen supplement","a":"","d":"Pollen supplements are a mixture of a pollen substitute and natural pollen. The added pollen makes the supplement more attractive and nutritious to the bees and they are more likely to consume it."},{"t":"pollen trap","a":"","d":"A pollen trap is a piece of hive equipment that is placed in front of the entrance or below the hive to collect pollen from incoming foragers. The pollen trap modifies the hive entrance and uses a screen that incoming foragers have to squeeze through, dislodging pollen from their pollen baskets."},{"t":"pollination","a":"","d":"Pollination is the transfer of pollen grains from the anther of a flower to the stigma of the flower, ultimately resulting in the fertilization of the plant’s ovule."},{"t":"pollination contract","a":"","d":"A pollination contract is a legally binding contract between a grower (that is renting colonies for pollination) and a beekeeper (that is providing the colonies)."},{"t":"polyandry","a":"(adjective: polyandrous)","d":"Polyandry is the practice of females mating with multiple males. Honey bees are polyandrous, as queens mate with an average of twelve males. Polyandry helps promote genetic diversity in colonies."},{"t":"polyethism","a":"","d":"Polyethism is the transitioning of workers through many different tasks as they age. Workers typically spend the first half of their lives as house bees performing various in-hive tasks, and the second half as foragers outside the hive. The shifts in duties are regulated by hormones and pheromones, and are affected by the age of the bee and the social environment of the colony."},{"t":"polyfloral honey","a":"","d":"Polyfloral honey is made from nectar of various plants. There is no main nectar source dominating in concentration."},{"t":"prepupa","a":"","d":"The life stage of an insect between the larval stage and the pupal stage."},{"t":"primary literature","a":"","d":"Primary literature is scientific (or other academic) work presented as academic journal articles. Primary literature is where scientific discoveries first appear in print."},{"t":"proboscis","a":"(plural: proboscises)","d":"A proboscis is the tubular mouthpart of the honey bee (formed when a bee brings together several components of her tongue to form an airtight tube) used to suck up nectar, honey, and water. The proboscis is also used for trophallaxis between bees. It is tucked up behind the chin when it is not needed."},{"t":"prolegs","a":"","d":"Prolegs are small, stubby, leg-like appendages that are found on some insects in the larval stage (such as waxmoths). They are not regarded as true legs."},{"t":"propolis","a":"(verb: to propolize)","d":"Propolis is a sticky substance created and used by bees to caulk and seal holes around the perimeter of their nest and between combs, protect the nest from moisture, and even cover or wall off unwelcome objects. Propolis also provides the colony with antimicrobial protection. Propolis is made from tree resins that foragers carry home in their pollen baskets, mixed with wax. Some subspecies of honey bees tend to produce more propolis than others."},{"t":"propolis envelope","a":"","d":"A propolis envelope is the name for a layer of propolis that sometimes lines the interior of the nest, protecting the colony."},{"t":"propolis trap","a":"","d":"A propolis trap is a piece of equipment used to collect propolis in the hive. It resembles a queen excluder and is placed on the top bars of a hive. Bees fill the cracks of the trap with propolis."},{"t":"protein","a":"","d":"A protein is an organic compound comprised of amino acids. Proteins perform a variety of functions in living organisms to help them develop and function. Proteins are acquired through the diet to provide essential amino acids that cannot be synthesized by the body. Honey bees meet their protein nutritional needs through pollen."},{"t":"proventriculus","a":"","d":"The proventriculus is a valve at the base of the honey crop. When closed, it prevents the nectar that a bee has collected from moving into the ventriculus; when open, it allows food to pass through and be digested."},{"t":"pseudoscience","a":"","d":"Pseudoscience is beliefs or statements that claim to be scientific and factual, but in reality contain fallacies in their arguments."},{"t":"pupa","a":"(plural: pupae; verb: to pupate)","d":"The pupa is the developmental phase of a honey bee following its stage as a larva and before it emerges as an adult. As a pupa, the bee is undergoing metamorphosis. Honey bee pupae develop within a cocoon in a cell capped with wax."},{"t":"pupate","a":"","d":"See pupa."},{"t":"queen","a":"","d":"A queen is a female bee with a fully developed reproductive system. She is generally mother to all the bees in the colony; indeed, there is typically no more than one queen in a colony at a time."},{"t":"queen bank","a":"","d":"A queen bank is a colony used to temporarily store mated queens before they are inserted into permanent colonies or shipped."},{"t":"queen cell","a":"","d":"Queen cells have female eggs laid in them that are intended to develop into queens. They may be supersedure cells or emergency queen cells. See also queen cup."},{"t":"queen cup","a":"","d":"Queen cups are cells built by worker bees for raising brood to become queens. They are present in the nest at most times, but are most abundant during the spring swarm season. They tend to be located toward the bottom of frames/comb and oriented downward. They are called queen cells once eggs have been laid in them."},{"t":"queen mother colony","a":"","d":"A queen mother colony is the colony that contains the breeder queen that will be used to rear additional queens. The queen mother colony is usually chosen based on specific criteria."},{"t":"queen pheromone","a":"(also known as queen substance)","d":"Queen pheromone is the name for the complete blend of pheromones secreted by the queen. It is comprised of nine different components that are released from several different glands on her body, including the mandibular gland. This complex of pheromones attracts drones during mating flights and attracts workers to surround and tend to the queen. It is spread around the colony; workers react quickly to its absence or decline."},{"t":"queenright","a":"","d":"A queenright colony is one that has a laying queen."},{"t":"race","a":"","d":"See subspecies."},{"t":"ropy test","a":"","d":"The ropy test is a quick field test to determine whether a colony has symptoms of American foulbrood. A toothpick or other thin tool is inserted into a brood cell, twisted, and pulled to see if the brood “ropes” or not."},{"t":"reproductive division of labor","a":"","d":"Reproductive division of labor is the separation in reproduction among individuals in a colony. In honey bee colonies, the queen caste specializes in reproduction, while the worker caste specialize in non-reproductive duties such as foraging and brood care. Reproductive division of labor is one of the three hallmarks of eusociality."},{"t":"residual toxicity","a":"","d":"Residual toxicity is the time required to reduce the acute toxicity of a pesticide (and its residues) so that bee mortality is lowered to 25%. Pesticides with extended residual toxicity remain toxic on the plant for at least 8 hours after application (and with some pesticides, over one week), whereas pesticides with low residual toxicity remain toxic for less than 8 hours."},{"t":"resin","a":"","d":"Resins are sticky substances secreted by plants and collected by bees to make propolis."},{"t":"retinue","a":"","d":"The queen’s retinue is the group of young worker bees that surround and care for her."},{"t":"reviews","a":"","d":"Reviews are academic articles that are summaries of multiple primary literature papers. They are published in academic journals."},{"t":"roaring","a":"","d":"Roaring is the distinctive loud buzzing sound coming from a colony that has been recently made queenless."},{"t":"robbing","a":"","d":"Robbing is the name for honey bees collecting (stealing) honey or nectar from another colony instead of from flowers."},{"t":"robbing screen","a":"","d":"A robbing screen is a screen placed on the colony entrance to reduce robbers from gaining entry to the hive."},{"t":"round dance","a":"","d":"A round dance is, in fact, a mistaken term: waggle dances communicating sources of food that are very close to the hive are so short in duration that they look like a different sort of dance, once called a round dance. We now know that these dances are just a short waggle dance."},{"t":"royal jelly","a":"","d":"Royal jelly is a very nutritious food source secreted by the hypopharyngeal glands and mandibular glands in nurse bees’ heads. It is milky in consistency and contains water, sugars, salts, fatty acids and other lipids, vitamins, amino acids, and proteins. Developing queens receive royal jelly during their entire larval phase, whereas developing workers are fed royal jelly for only the first 2 - 3 days."},{"t":"scout bee","a":"","d":"Scout bees are specialized foragers that search for resources like nectar or pollen, or new nest sites for a swarm."},{"t":"screened bottom board","a":"","d":"A screened bottom board is a specialized bottom board that is largely comprised of mesh wire screening. Screened bottom boards are used for increasing ventilation in a colony and as a cultural method to control Varroa mites."},{"t":"settling","a":"","d":"Settling is the process of separating wax, particles, and other debris from honey by allowing it to sit for a long period of time (often 2 - 3 days). The wax, particles, and other debris separate from the honey by rising to the surface."},{"t":"sex pheromone","a":"","d":"Sex pheromones are released by organisms to attract members of the opposite sex to mate with them. In honey bees, queen pheromone is a sex pheromone that attracts drones."},{"t":"small hive beetle","a":"","d":"The small hive beetle (Aethina tumida) is a pest in honey bee colonies. It is a small black beetle that feeds on pollen, bee bread, honey, nectar, and brood. This pest can cause honey to ferment."},{"t":"social fever","a":"","d":"A social behavior whereby bees increase the temperature of the broodnest slightly to kill chalkbrood."},{"t":"social immunity","a":"","d":"Social immunity is collective social behavior that aims to reduce, control, or eliminate parasites and pathogens. Social immunity encompasses a variety of behaviors such as hygienic behavior, grooming, removing dead bodies from the nest, and creating a social fever."},{"t":"spermatheca","a":"","d":"The spermatheca is a sac in a female insect’s abdomen that stores sperm after mating. Queens have a spermatheca. Worker bees also have a spermatheca, but relative to the queen’s, theirs are tiny and cannot store sperm."},{"t":"species","a":"","d":"A species is a group of organisms that is capable of mating and producing fertile offspring. Species are the basic rank in the classification of life. Species names are always italicized. Honey bees are the species Apis mellifera."},{"t":"spiracle(s)","a":"","d":"Spiracles are small holes along the thorax and abdomen of a honey bee that allow respiration to take place. They are the openings where the tracheae exit the body."},{"t":"splitting a colony","a":"(also known as dividing a colony)","d":"The management practice of taking a strong colony and splitting it into two smaller colonies by moving over the appropriate number of frames of brood, adults, food stores, and comb. Afterward, the original (often the stronger of the two) colony is the referred to as the \"parent colony;\" the newly created colony is referred to as the \"split.\" spore A spore is the reproductive unit for some fungi, plants, and bacteria. Chalkbrood, Nosema, and American foulbrood bacteria all reproduce through spores."},{"t":"stock","a":"","d":"A stock is a group of honey bees bred for a specific combination of traits."},{"t":"straining","a":"","d":"Straining is the process of removing large bits of wax, pollen, debris, and other particles from honey by passing it through a fabric or wire mesh. Some particles remain in honey after straining."},{"t":"sublethal effects","a":"","d":"Sublethal effects of pesticides are adverse effects on bee health that are less than lethal. Examples of sublethal effects include altered behavior, development, and reproduction."},{"t":"subspecies","a":"","d":"A subspecies (or race) is a genetically distinct (and often geographically isolated) population of organisms within one species. Subspecies have differences in physical and behavioral traits, but are able to mate with each other, where their offspring are called \"hybrids.\" A subspecies name is designated by the third part of a scientific name. For example, the Carniolan bee is called Apis mellifera carnica, where carnica is the subspecies/race."},{"t":"sucking pump","a":"","d":"The sucking pump is a muscle-lined sac within the mouth of the honey bee that allows it to suck up liquids through its proboscis. The pump also allows for nectar to be regurgitated for sharing with nestmates or storing in cells to make honey."},{"t":"sugar syrup","a":"","d":"Sugar syrup is a solution of sugar and water used as a carbohydrate supplement for honey bee colonies. It is most often mixed as 1 part sugar to 2 parts water, or 2 parts sugar to 1 part water."},{"t":"summer bees","a":"","d":"Summer bees are the bees that are born and live during the active, warm season. They are slightly physiologically different from winter bees, which are produced within the colony from late summer to late fall and survive the winter."},{"t":"sump","a":"","d":"A sump is a temporary holding tank for honey. Honey that flows out of the extractor flows into a sump before it is pumped to a filtering tank, a settling tank, or a bottling tank. Sumps also help to heat honey gently and to strain wax and other large particles out of honey."},{"t":"supersede","a":"(noun: supersedure)","d":"Supersedure is the natural replacement of an old or failing queen with a younger queen by the workers in the colony."},{"t":"supersedure cell","a":"","d":"Supersedure cells are a specific type of queen cell that worker bees build while their queen is still present in the colony, with the intention of superseding her. These queen cells are distinct from emergency queen cells."},{"t":"superorganism","a":"","d":"A superorganism is a group of related social individuals working together to effectively cooperate as one large organism."},{"t":"swarm","a":"","d":"noun: A swarm is a cluster of bees that has left its old nest, including the queen of the original colony, and has temporarily settled in the open before locating a new home. verb: Swarming is the name given to the act of these bees leaving the nest. This process is colony-level reproduction, as only a fraction of bees leave the original nest and the colony effectively divides itself into two (or more) colonies."},{"t":"swarm cell","a":"","d":"Swarm cells are a specific type of queen cell that worker bees build while their queen is still present in the colony. The colony is then prepared to swarm, and the swarmed queen will be naturally replaced with a new queen from a swarm cell."},{"t":"symbiotic","a":"","d":"A symbiotic relationship is the mutual beneficial interactions between two organisms; for example, honey bees and their healthy gut bacteria."},{"t":"synergistic effect","a":"","d":"A synergistic effect is an interactive effect between two or more pesticides that produce an effect greater than the sum of their individual effects."},{"t":"systematic pesticide","a":"","d":"A systematic pesticide is taken up and distributed throughout all parts of the plant to which it is applied. Neonicotinoids are examples of systematic pesticides."},{"t":"testing apiary","a":"","d":"A testing apiary is an apiary with colonies that will be evaluated for specific traits of interest to be considered for drone mother and queen mother colonies."},{"t":"thermoregulation","a":"","d":"Active and passive thermoregulation keeps the colony (and specifically the brood nest) at a constant temperature. This allows the brood to develop properly and the colony to survive weather extremes in a wide range of climates around the world."},{"t":"thorax","a":"","d":"The thorax is the middle segment of an insect’s body, located between the head and the abdomen."},{"t":"trachea","a":"(plural: tracheae)","d":"Tracheae are a series of tubes through which honey bees breathe. They function much like lungs, carrying oxygen to muscles and organs and carrying carbon dioxide away from them. Tracheae exit the body through spiracles."},{"t":"tracheal mite","a":"","d":"The tracheal mite, Acarapis woodi, is a very small, white mite that parasitizes honey bees. The mite resides in the honey bee’s trachea, where it feeds on bee hemolymph and reproduces."},{"t":"treatment threshold","a":"","d":"The treatment threshold is parasite or pest level that predicts colony morbidity or mortality. In an Integrated Pest Management approach, a control method is used when pests and parasites meet or exceed this value."},{"t":"tremble dance","a":"","d":"The tremble dance is a dance performed by foragers to recruit bees to unload nectar from incoming foragers. If a forager that has found an excellent nectar source cannot find a receiver bee to unload her when she returns to the hive, she will perform a tremble dance instead of a waggle dance."},{"t":"trophallaxis","a":"","d":"Trophallaxis is the transfer or exchange of fluids or food mouth-to-mouth (or proboscis-to-proboscis). Trophallaxis allows bees to feed queens and larvae, unload nectar or water from foraging trips, share pheromones, and more."},{"t":"two-queen colony","a":"","d":"A colony that contains two queens and is used for increased honey production. Two-queen colonies are manipulated in a specific arrangement to keep the queens separate from one another."},{"t":"ultrafiltration","a":"","d":"Ultrafiltration is the process where honey is passed through an extremely small filter (one tenth of a micrometer in size) so that every particle is removed from it. The resulting product is no longer considered honey by the United States Food and Drug Administration. Instead, it is considered a sweetener."},{"t":"undertakers","a":"","d":"Undertakers are subset of middle-aged bees (2 - 3 weeks old) tasked with removing corpses and debris to maintain low levels of dead, diseased, and unwanted materials in the hive."},{"t":"Varroa mite","a":"","d":"A Varroa mite is a parasitic mite (Varroa destructor) that feeds on the hemolymph and fat bodies of bees, reproduces in brood, and transmits several viruses."},{"t":"venom","a":"","d":"Bee venom is the toxic liquid that is pumped into whatever organism a worker or queen stings. It has over 50 components, including a protein that stimulates the release of histamine in animals (including humans) and other chemicals that together can trigger an allergic response. Barbs in the worker bee’s stinger anchor the stinger so that it can continue to pump venom even after the bee disengages or dies. Venom is not the same as the alarm pheromone that is also released to attract and stimulate other bees to sting."},{"t":"ventriculus","a":"","d":"The honey bee ventriculus is analogous to a human stomach. It is where food is digested and nutrients are absorbed in the midgut."},{"t":"vitamin","a":"","d":"A vitamin is a nutrient necessary for life. Important vitamins for honey bee health include the vitamin B complex and vitamin C."},{"t":"vitellogenin","a":"","d":"Vitellogenin is a protein found in bees’ ovaries (and other tissues) that is important for making eggs. It also has functions in producing royal jelly, caste differentiation, and worker polyethism."},{"t":"waggle dance","a":"","d":"The waggle dance is a dance performed by foragers and scout bees to communicate information about the location of sources of food/resources and nest sites. The pattern indicates direction and distance; the number of times the dance is repeated indicates the quality of the source or nest site. It is a famous example of honey bee communication."},{"t":"wax","a":"","d":"Wax is the malleable substance that honey bees secrete and use to build comb in their nest. House bees producing wax through their wax glands must consume a lot of honey to produce wax. Wax absorbs lipophilic (fat-loving) substances."},{"t":"wax gland","a":"","d":"Wax glands are on the underside of worker bees’ abdomens. These glands are most active before the worker transitions to foraging."},{"t":"wax mirrors","a":"","d":"When honey bees produce wax, they excrete liquid wax from their wax glands and deposit it onto plates called wax mirrors, where it hardens into scales or flakes as it dries. The bees then scrape off the hardened wax scales, chew and moisten it until it is the right consistency, and transfer it to the comb."},{"t":"wax moth","a":"","d":"A wax moth is a mild to moderate pest of honey bee colonies, consuming wax, nectar, honey, pollen, bee bread, and cocoons, and spinning webs. There are two species of wax moths: the greater wax moth (Galleria mellonella) and the lesser wax moth (Achroia grisella). All life stages (egg, larva, pupa, and adult) can be found in the hive."},{"t":"winter bees","a":"","d":"Winter bees are produced within a colony from late summer to late fall to survive the winter. Their physiology differs from that of summer bees insofar as they have lower levels of juvenile hormone, larger hypopharyngeal glands, and larger and more numerous fat bodies than summer bees."},{"t":"winter cluster","a":"","d":"See cluster."},{"t":"winter patty","a":"","d":"A winter patty is a food supplement fed to honey bee colonies in the winter. It is comprised of mainly sugar, water, and corn syrup, with small amounts of pollen substitute."},{"t":"worker","a":"","d":"A worker is a female bee that is not the queen of the colony. The vast majority of bees in a healthy colony are workers—offspring of the queen and the drones that she has mated with. Workers perform many tasks in the colony (see polyethism), but usually refrain from reproduction."},{"t":"yellowjacket","a":"","d":"Yellowjackets are the common name for social, yellow and black striped wasps in the generea Vespula or Dolichovespula. They can be a pest to honey bee colonies in August to October in the US."},{"t":"zombee","a":"","d":"A zombee is a bee that has been parasitized by a phorid fly and is displaying unusual behavior, most notably flying to light sources at night."}],"quickfacts":[["Bee space","3/8 inch (9.5 mm). Smaller and bees fill it with propolis; larger and they build burr comb."],["Winter cluster forms","Below 64°F (18°C). Foraging and water collection stop."],["Brood incubation temp","91–97°F (33–36°C), maintained by heater bees."],["Healthy brood pattern","Solid 'rainbow': brood in center, arc of pollen, honey on top. 6–17% empty cells is normal."],["Drones at peak","About 5% of adult bees in late spring / early summer. Far more late summer = possible drone-laying queen."],["Drone comb (natural)","About 17–20% of comb — roughly 2 frames in a 10-frame box. Usually along bottom/sides, not the center."],["NE swarm season","Peaks mid-May to mid-July. Colony starts making drones at about 4,000 bees."],["Queen mating","1–3 mating flights, mates with an average of 12 drones (range 10–20). Mating flights and swarms are the only times she leaves."],["Frame replacement","Replace your 2 oldest frames per box each year. Never pull more than 4 frames from a hive at once."],["Brood frames to inspect","At least 4 frames of brood per box."],["Honey moisture","Capped at about 17–19% water. Above ~18% it can ferment."],["Sugar syrup mixes","1:1 (1 sugar : 1 water) to stimulate brood in spring; 2:1 (2 sugar : 1 water) to build winter stores in fall."],["Pollen / bee bread","1–2 frames per brood box is ideal for brood rearing."],["Good resource flow","10–20 bees per minute entering with full pollen baskets means lots is coming in."],["AFB rope test","Insert a toothpick into a suspect cell, twist, and pull. If it 'ropes' out 2 cm+, suspect American Foulbrood. Send samples to the Beltsville Bee Lab (free)."],["Guanine crystals","Small white crystals on the ceilings of brood cells = high Varroa mite levels."]],"varroa":[{"name":"Apiguard","ai":"Thymol","cls":"Essential oil","method":"Tray with gel sits on brood frames","eff":"74–95%","cost":"$3.30–$6.80","dur":"28 days (two 14-day applications)","supers":"No — supers off","wait":"Can super immediately after treatment ends","temp":"Needs warmth — roughly 60–105°F to vaporize properly"},{"name":"Api Life Var","ai":"Thymol, eucalyptus oil, menthol","cls":"Essential oil","method":"Tablets placed on the corners of the brood nest","eff":"70–90%","cost":"$4.48–$7.12","dur":"21–30 days (3 applications, 7–10 days apart)","supers":"No — supers off","wait":"1 month after treatment ends","temp":"Needs warmth — roughly 60–105°F"},{"name":"MiteAway Quick Strips (MAQS)","ai":"Formic acid","cls":"Organic acid","method":"Pads placed on the brood nest","eff":"61–98%","cost":"$4.40–$7.25","dur":"7 days","supers":"Yes — can be left on during treatment","wait":"Supers can stay on","temp":"Moderate temps only — about 50–85°F (too hot can kill brood/queen)"},{"name":"Oxalic Acid","ai":"Oxalic acid dihydrate","cls":"Organic acid","method":"Dribble on brood nest, or vaporize at entrance","eff":"82–99%","cost":"$0.25–$0.37","dur":"10 minutes","supers":"No — supers off","wait":"2 weeks","temp":"Best when brood is low/absent (late fall, broodless). Works in cool weather."},{"name":"HopGuard II","ai":"Hops beta acids","cls":"Organic acid","method":"Strips inserted in the brood nest","eff":"75–99%","cost":"$3.33–$3.80","dur":"28 days","supers":"Yes — can be left on during treatment","wait":"Supers can stay on","temp":"Wide range"},{"name":"Apivar","ai":"Amitraz","cls":"Synthetic","method":"Insert strips into the brood nest","eff":"95%","cost":"$5.00–$6.90","dur":"42–56 days","supers":"No — supers off","wait":"2 weeks","temp":"Wide range"}],"varroaNote":"Apistan and CheckMite+ are NOT recommended — they stay in wax for years and mites have developed resistance. Rotate treatments, remove strips promptly, and follow IPM. Resistance to Apivar has also been seen. Always monitor mite levels after treating to confirm it worked. Efficacy figures: Honey Bee Health Coalition, Tools for Varroa Management, 5th ed.","inspect":[{"h":"Before you open","items":["Set your objective for this visit — why are you in the hive today?","Tool kit ready: smoker lit, hive tool, notebook/phone, gear for what you plan to do.","Weather OK? Calm, mild, ideally sunny mid-day when foragers are out."]},{"h":"Outside the hive (before opening)","items":["Predator signs: skunk scratch marks at the entrance or on the ground? Elevate the hive on a stand if so.","Fecal matter: a little on the front is normal; heavy orange/brown streaks signal trouble (dysentery/disease).","Guard bees: wave a hand slowly across the entrance. If a guard follows it, use smoke to break her attention."]},{"h":"Population status","items":["Population: enough adult bees for the season? Strong = bees nearly cover both sides of each brood frame.","Queen status: worker eggs present? Signs of supersedure or swarm prep? Laying-worker signs (multiple eggs per cell)?","Brood: solid or spotty? Enough for the time of year? All ages present — eggs, larvae, capped brood?","Trend: does the population seem to be growing or shrinking for this time of year?","Drones: seasonally appropriate amount? (~5% at peak. Lots of capped drone late summer = possible drone-layer.)"]},{"h":"Nutrition","items":["Floral sources: what's blooming now? Any drought or long bad weather hurting forage?","Foraging: enough bees flying? 10–20 bees/min entering with full pollen = good flow.","Stores: how much pollen/bee bread and nectar/honey? Right amount for the season?","Larval nutrition: young larvae floating in abundant white royal jelly? (Thin/no jelly = consider protein.)"]},{"h":"Pests, parasites & disease","items":["Brood disease signs? Discolored, twisted, melted, cannibalized larvae, or punctured/perforated cappings.","Adult bees: deformities or odd behavior? Visible Varroa, hive beetles, wax moths, or their larvae?","Pests in the honey supers or elsewhere in the hive?","Are the bees more defensive than usual?"]},{"h":"In the brood nest","items":["Inspect at least 4 brood frames per box.","Adults: look for hairlessness, greasiness, deformed wings, twitching.","Brood health: hold frame with sun at your back, angled so light fills the cells. Look for a solid 'rainbow' pattern.","Brood pattern & sex: eggs near center working outward; one egg per cell. Multiple eggs/cell = laying workers.","Queen cups & cells: a few empty cups is normal. Many cups + eggs/larvae along the BOTTOM = swarm prep. A few near the CENTER = supersedure/emergency.","Brood nutrition: 1–2 frames of pollen per box ideal; abundant royal jelly around larvae.","Comb condition: replace 2 oldest frames per box per year — but never pull more than 4 frames at once."]},{"h":"Wrap up","items":["Return every frame in the same order and orientation so the brood nest stays intact.","Decide management: more honey-storage room? Swarm prevention? Treatment?","Note when to come back and anything to follow up on. Photograph anything unusual."]}],"disease":[{"name":"Varroa / Parasitic Mite Syndrome","type":"Mite + virus complex","look":"Spotty brood, perforated or chewed-down cappings, twisted larvae. White guanine
