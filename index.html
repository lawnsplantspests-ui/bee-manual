crystals on cell ceilings. Deformed wings and K-wing on adults. Reddish-brown mites visible on bees or in drone brood.","do":"Monitor with an alcohol wash / sugar roll. Treat per the Varroa page when over threshold. The #1 colony killer — stay ahead of it."},{"name":"American Foulbrood (AFB)","type":"Bacteria (Paenibacillus larvae)","look":"Sunken, greasy, perforated cappings. Brown, goopy pupae that ROPE OUT 2 cm or more on a toothpick. Hard black scale stuck to the cell that will NOT scrape off. Foul smell.","do":"⚠️ Highly infectious and serious. Don't share equipment. Send samples to the Beltsville Bee Lab (free) and contact your state apiarist. Often requires burning infected equipment."},{"name":"European Foulbrood (EFB)","type":"Bacteria (Melissococcus plutonius)","look":"Twisted, melted-looking larvae that turn brown/yellow and die BEFORE capping. Goopy but ropes less than AFB (up to ~1.5 cm). Often a sour smell.","do":"Often clears with a strong nectar flow, requeening, or comb rotation. Confirm vs AFB — when unsure, send a sample."},{"name":"Chalkbrood","type":"Fungus (Ascosphaera apis)","look":"Larvae turn into hard, chalky white (sometimes black/blue-spotted) 'mummies' that rattle in cells or show up on the bottom board / at the entrance. Larvae stand up in the cell; easily scraped out, doesn't rope.","do":"Usually stress-related. Improve ventilation, requeen for hygienic stock, keep colonies strong."},{"name":"Sacbrood","type":"Virus","look":"Fluid-filled, sac-like larvae lying flat. Larvae turn brown and settle to the bottom of the cell, head often dark and curled ('canoe' / Chinese-slipper shape).","do":"Usually self-limiting in a strong colony. Requeen if persistent."},{"name":"Nosema","type":"Gut fungus (N. apis / N. ceranae)","look":"Dysentery — brown streaks on/around the hive (N. apis especially). Crawling bees unable to fly, decreased adult population, dwindling.","do":"Reduce stress, improve ventilation, replace old comb. Confirm by spore count if needed."},{"name":"Tracheal mite","type":"Mite (Acarapis woodi)","look":"K-wing (wings held at odd angles), crawling bees that can't fly, discolored tracheae under magnification.","do":"Less common now. Grease patties and resistant stock help."},{"name":"Wax moth","type":"Pest (Galleria / Achroia)","look":"Silk webbing and tunnels through comb, especially in weak colonies or stored comb. Larvae burrow under cappings (bald-brood trails).","do":"A symptom of a weak colony — strengthen or combine. Protect stored comb (freeze frames, store cool & airy)."},{"name":"Small hive beetle","type":"Pest (Aethina tumida)","look":"Small fast black beetles running on frames; slimy, fermented 'sliming' of comb; larvae in the honey.","do":"Keep colonies strong, reduce open space, use beetle traps. Worse in warm, humid conditions."},{"name":"Deformed Wing Virus (DWV)","type":"Virus (Varroa-vectored)","look":"Adults emerge with crumpled, stubby, useless wings; bloated abdomens; shortened lifespan.","do":"A red flag for high Varroa. Get mites under control — DWV rides with them."}],"library":[{"mod":"Quick Reference (field)","files":[{"title":"Beekeeping Calendar (Northeast)","url":"library/misc/Beekeeping-Calendar-for-the-Northeast.pdf","kb":2697},{"title":"Disease Symptom Chart","url":"library/misc/Honey-Bee-Disease-Symptom-Chart.pdf","kb":165},{"title":"Diseases & Pests Chart","url":"library/misc/Honey-Bee-Diseases-and-Pests-Chart.pdf","kb":331},{"title":"Hive Inspection Guide","url":"library/misc/HIVE-INSPECTION-GUIDE-(R2).pdf","kb":148},{"title":"Treatment Hierarchy diagram","url":"library/misc/illustration-of-treatment-hierarchy-V2.gif","kb":16},{"title":"Tropilaelaps Mite ID","url":"library/misc/Tropi-STOP-ID.pdf","kb":565},{"title":"Varroa Control Calendars","url":"library/misc/Example-Varroa-control-calendars.pdf","kb":82},{"title":"Varroa Treatment Guide","url":"library/misc/Varroa-treatment-guide.pdf","kb":75},{"title":"Varroa-Resistant Bee Breeders (US)","url":"library/misc/Reputable-Varroa-Resistant-Bee-Breeders-US.pdf","kb":73}]},{"mod":"1 · Evolution, Biology & Behavior","files":[{"title":"Bee anatomy","url":"library/module1/ptrent001-bee-anatomy.pdf","kb":3376},{"title":"Course transcript","url":"library/module1/PTRENT001-course-transcript.pdf","kb":3601},{"title":"Egg timeline","url":"library/module1/ptrent001-egg-timeline.pdf","kb":940},{"title":"Glossary","url":"library/module1/ptrent001-glossary.pdf","kb":847},{"title":"Kin selection","url":"library/module1/ptrent001-kin-selection.pdf","kb":3856},{"title":"Worker polyethism","url":"library/module1/ptrent001-worker-polyethism.pdf","kb":950}]},{"mod":"2 · The Science & Art of Beekeeping","files":[{"title":"Amino acids","url":"library/module2/ptrent002-amino-acids.pdf","kb":279},{"title":"Bee Subspecies 2022","url":"library/module2/PTRENT002-Bee-Subspecies-2022.pdf","kb":47},{"title":"Course transcript","url":"library/module2/ptrent002-course-transcript.pdf","kb":4458},{"title":"Glossary","url":"library/module2/ptrent002-glossary.pdf","kb":275},{"title":"Queen rearing schedule","url":"library/module2/ptrent002-queen-rearing-schedule.pdf","kb":118},{"title":"Stock traits 2020","url":"library/module2/PTRENT002-Stock-traits-2020.pdf","kb":98},{"title":"Valuable pollen resources","url":"library/module2/ptrent002-valuable-pollen-resources.pdf","kb":124}]},{"mod":"3 · Managing Pests & Diseases","files":[{"title":"Course transcript","url":"library/module3/ptrent003-course-transcript.pdf","kb":12686},{"title":"Glossary","url":"library/module3/ptrent003-glossary.pdf","kb":310}]},{"mod":"4 · Rewards & Contributions","files":[{"title":"Beginning honey beekeeping equipment and associated costs agec 2002 a","url":"library/module4/beginning-honey-beekeeping-equipment-and-associated-costs-agec-2002-a.pdf","kb":3057},{"title":"Challenges of meeting oklahomas farmers market regulations and varied requirements fapc 184","url":"library/module4/challenges-of-meeting-oklahomas-farmers-market-regulations-and-varied-requirements-fapc-18","kb":267},{"title":"Glossary","url":"library/module4/ptrent004-glossary.pdf","kb":1402},{"title":"Hive Stocking Rates V3","url":"library/module4/Hive-Stocking-Rates-V3-(1).pdf","kb":35},{"title":"Hive Stocking Rates V3","url":"library/module4/Hive-Stocking-Rates-V3.pdf","kb":35},{"title":"Honeycomb to Consumer Marketing Small Scale Honey NY 2014","url":"library/module4/Honeycomb-to-Consumer-Marketing-Small-Scale-Honey-NY-2014.pdf","kb":3006},{"title":"Inventory workbook","url":"library/module4/Inventory-workbook.pdf","kb":758},{"title":"Master Beekeeping Part IV course transcript","url":"library/module4/ptrent004-Master-Beekeeping-Part-IV-course-transcript.pdf","kb":19044},{"title":"Mentoring Schedule for a First Year Mentee","url":"library/module4/Mentoring-Schedule-for-a-First-Year-Mentee.pdf","kb":44},{"title":"Neonic sublethal impacts chart","url":"library/module4/Neonic-sublethal-impacts-chart.pdf","kb":37},{"title":"Pollination in the United States V2","url":"library/module4/Pollination-in-the-United-States-V2-(1).pdf","kb":48},{"title":"Pollination Services Contract Example 1","url":"library/module4/Pollination-Services-Contract-Example-1.pdf","kb":94},{"title":"Rubric for Growing your Operation 2","url":"library/module4/Rubric-for-Growing-your-Operation-2.pdf","kb":37},{"title":"US Pollination","url":"library/module4/US-Pollination.pdf","kb":1307}]},{"mod":"Full course text & summaries","files":[{"title":"Clean Course Content","url":"library/summaries/Master-Beekeeping-Clean-Content.pdf","kb":1082},{"title":"Complete Course Transcript","url":"library/misc/Master-Beekeeping-Complete-Transcript.pdf","kb":39878},{"title":"Key Points Summary","url":"library/summaries/Master-Beekeeping-Key-Points.pdf","kb":36}]},{"mod":"Exam prep","files":[{"title":"Field Exam Part 1 Rubric","url":"library/misc/Virtual-Field-Exam-Part-1-Rubric.pdf","kb":158},{"title":"Final Exam Video Outline","url":"library/misc/CORNELL-MBK-FINAL-EXAM-VIDEO-OUTLINE.pdf","kb":73},{"title":"Full Syllabus","url":"library/misc/CORNELL-MBK-FULL-SYLLABUS.pdf","kb":172},{"title":"Oral Exam Rubric","url":"library/misc/Oral-Exam-Rubric.pdf","kb":100},{"title":"Oral Topic List","url":"library/misc/ORAL-TOPIC-LIST.pdf","kb":52}]},{"mod":"More resources","files":[{"title":"Colony Drift (research)","url":"library/misc/COLONY-DRIFT-(FINAL).pdf","kb":8317},{"title":"From Honey Bees to Internet Servers","url":"library/misc/FromhoneybeestoInternetserversNakrani.pdf","kb":257}]}]};
</script>
<script>
(function(){
  const D = window.DATA, app = document.getElementById('app');
  const LIB_BASE = window.LIB_BASE || '';  // '' = same site; apiary copy overrides with absolute URL
  const q = document.getElementById('q'), clr = document.getElementById('clr');
  const back = document.getElementById('back'), htitle = document.getElementById('htitle');
  let view = 'home', alpha = '';

  const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  function hl(text, terms){
    let t = esc(text);
    terms.forEach(w=>{ if(w.length<2) return;
      t = t.replace(new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>'); });
    return t;
  }

  const TILES = [
    {v:'glossary', ic:'📖', nm:'Glossary', sub:D.glossary.length+' terms, A–Z & searchable'},
    {v:'inspect',  ic:'🔍', nm:'Inspection Checklist', sub:'Tap-through field checklist'},
    {v:'varroa',   ic:'🪲', nm:'Varroa Treatments', sub:'Compare 6 mite treatments'},
    {v:'disease',  ic:'🩺', nm:'Disease & Pest ID', sub:'Spot it in the field'},
    {v:'facts',    ic:'📐', nm:'Quick Reference', sub:'Key numbers & rules of thumb'},
    {v:'library',  ic:'📚', nm:'Course Library', sub:'All your course files'},
  ];

  function go(v){ view=v; if(v!=='glossary') alpha=''; q.value=''; clr.classList.remove('show');
    window.scrollTo(0,0); render(); }
  back.onclick = ()=>go('home');

  function render(){
    const term = q.value.trim();
    back.classList.toggle('show', view!=='home' || !!term);
    htitle.textContent = term ? 'Search' :
      ({home:'Bee Field Guide',glossary:'Glossary',inspect:'Inspection Checklist',
        varroa:'Varroa Treatments',disease:'Disease & Pest ID',facts:'Quick Reference',
        library:'Course Library'}[view]);
    if(term){ app.innerHTML = renderSearch(term); bindGlossary(); return; }
    if(view==='home') return renderHome();
    if(view==='glossary') return renderGlossary();
    if(view==='inspect') return renderInspect();
    if(view==='varroa') return renderVarroa();
    if(view==='disease') return renderDisease();
    if(view==='facts') return renderFacts();
    if(view==='library') return renderLibrary();
  }

  function renderHome(){
    app.innerHTML =
      '<p class="lead">Your beekeeping field manual — search anything, or pick a section. Works offline.</p>'+
      '<div class="install" id="install">📲 Tip: tap your browser’s Share button and choose <b>Add to Home Screen</b> to use this like an app.</div>'+
      '<div class="grid">'+
      TILES.map(t=>`<div class="tile" data-v="${t.v}"><div class="ic">${t.ic}</div>`+
        `<div class="nm">${t.nm}</div><div class="sub">${t.sub}</div></div>`).join('')+
      '</div>';
    app.querySelectorAll('.tile').forEach(el=>el.onclick=()=>go(el.dataset.v));
    if(showInstallHint) document.getElementById('install').classList.add('show');
  }

  function renderGlossary(){
    const letters = [...new Set(D.glossary.map(g=>g.t[0].toUpperCase()))].sort();
    const list = alpha ? D.glossary.filter(g=>g.t[0].toUpperCase()===alpha) : D.glossary;
    app.innerHTML =
      '<div class="alpha">'+
        `<button class="${alpha===''?'on':''}" data-a="">All</button>`+
        letters.map(L=>`<button class="${alpha===L?'on':''}" data-a="${L}">${L}</button>`).join('')+
      '</div>'+
      '<div id="glist">'+list.map(gItemHTML).join('')+'</div>';
    app.querySelectorAll('.alpha button').forEach(b=>b.onclick=()=>{alpha=b.dataset.a;window.scrollTo(0,0);render();});
    bindGlossary();
  }
  function gItemHTML(g){
    const alias = g.a ? ` <span class="galias">${esc(g.a)}</span>` : '';
    return `<div class="gitem"><span class="chev">›</span>`+
      `<div class="gterm">${esc(g.t)}${alias}</div>`+
      `<div class="gdef">${esc(g.d)}</div></div>`;
  }
  function bindGlossary(){
    app.querySelectorAll('.gitem').forEach(el=>el.onclick=()=>el.classList.toggle('open'));
  }

  function renderInspect(){
    app.innerHTML =
      '<p class="lead">A walk-through for a routine inspection. Tap items as you go. <button class="reset" id="rst">Reset all</button></p>'+
      D.inspect.map((s,si)=>
        `<div class="card"><h3>${esc(s.h)}</h3>`+
        s.items.map((it,ii)=>{
          const id='ck_'+si+'_'+ii, on=localStorage.getItem(id)==='1';
          return `<div class="chk ${on?'done':''}" data-id="${id}"><div class="box">✓</div><div class="txt">${esc(it)}</div></div>`;
        }).join('')+`</div>`).join('');
    app.querySelectorAll('.chk').forEach(el=>el.onclick=()=>{
      el.classList.toggle('done');
      localStorage.setItem(el.dataset.id, el.classList.contains('done')?'1':'0');
    });
    document.getElementById('rst').onclick=(e)=>{e.stopPropagation();
      Object.keys(localStorage).filter(k=>k.startsWith('ck_')).forEach(k=>localStorage.removeItem(k));
      render();};
  }

  function renderVarroa(){
    app.innerHTML =
      '<p class="lead">Compare chemical Varroa treatments. Always check the current label and temperature before applying.</p>'+
      `<div class="warnbox">${esc(D.varroaNote)}</div>`+
      D.varroa.map(v=>
        `<div class="card"><span class="pill">${esc(v.cls)}</span><h3>${esc(v.name)}</h3>`+
        kv('Active',v.ai)+kv('How',v.method)+kv('Efficacy',v.eff)+kv('Cost/colony',v.cost)+
        kv('Duration',v.dur)+kv('Supers on?',v.supers)+kv('Then wait',v.wait)+kv('Temperature',v.temp)+
        `</div>`).join('');
  }
  const kv=(k,v)=>`<div class="kv"><b>${k}</b><span>${esc(v)}</span></div>`;

  function renderDisease(){
    app.innerHTML =
      '<p class="lead">Quick field ID. When in doubt — especially with foulbrood — send a sample to the Beltsville Bee Lab.</p>'+
      D.disease.map(d=>
        `<div class="card"><span class="pill">${esc(d.type)}</span><h3>${esc(d.name)}</h3>`+
        `<div class="kv"><b>Look for</b><span>${esc(d.look)}</span></div>`+
        `<div class="kv"><b>What to do</b><span>${esc(d.do)}</span></div></div>`).join('');
  }

  function renderFacts(){
    app.innerHTML =
      '<p class="lead">Numbers and rules of thumb worth knowing by heart.</p>'+
      D.quickfacts.map(f=>`<div class="card"><h3>${esc(f[0])}</h3><div style="font-size:14.5px">${esc(f[1])}</div></div>`).join('');
  }

  function renderLibrary(){
    app.innerHTML =
      '<p class="lead">Your full Cornell Master Beekeeping course. Tap any file to open it.</p>'+
      '<div class="lib">'+
      D.library.map(m=>`<h3>${esc(m.mod)}</h3>`+
        m.files.map(f=>{
          const ic = f.url.toLowerCase().endsWith('.gif') ? '🖼️' : '📄';
          const sz = f.kb ? ` <span class="muted" style="font-size:11.5px">${f.kb>=1024?(f.kb/1024).toFixed(1)+' MB':f.kb+' KB'}</span>` : '';
          return `<a class="file" href="${LIB_BASE}${esc(f.url)}" target="_blank" rel="noopener">`+
            `<span class="fic">${ic}</span><span>${esc(f.title)}${sz}</span><span style="margin-left:auto;color:var(--amber)">›</span></a>`;
        }).join('')
      ).join('')+'</div>';
  }

  // ---- search across everything ----
  function renderSearch(term){
    const words = term.toLowerCase().split(/\s+/).filter(Boolean);
    const match = txt => { const l=(txt||'').toLowerCase(); return words.every(w=>l.includes(w)); };
    let html='';
    const gl = D.glossary.filter(g=>match(g.t+' '+g.a+' '+g.d));
    if(gl.length){
      html+='<div class="res-group">Glossary ('+gl.length+')</div>';
      html+=gl.slice(0,60).map(g=>{
        const alias=g.a?` <span class="galias">${esc(g.a)}</span>`:'';
        return `<div class="gitem open"><div class="gterm">${hl(g.t,words)}${alias}</div>`+
          `<div class="gdef">${hl(g.d,words)}</div></div>`;
      }).join('');
    }
    const df = D.disease.filter(d=>match(d.name+' '+d.type+' '+d.look+' '+d.do));
    if(df.length){
      html+='<div class="res-group">Disease & Pest ID</div>';
      html+=df.map(d=>`<div class="card"><span class="pill">${esc(d.type)}</span><h3>${hl(d.name,words)}</h3>`+
        `<div class="kv"><b>Look for</b><span>${hl(d.look,words)}</span></div>`+
        `<div class="kv"><b>What to do</b><span>${hl(d.do,words)}</span></div></div>`).join('');
    }
    const vf = D.varroa.filter(v=>match(v.name+' '+v.ai+' '+v.cls+' '+v.method+' '+v.temp));
    if(vf.length){
      html+='<div class="res-group">Varroa Treatments</div>';
      html+=vf.map(v=>`<div class="card"><span class="pill">${esc(v.cls)}</span><h3>${hl(v.name,words)}</h3>`+
        kv('Active',v.ai)+kv('How',v.method)+kv('Efficacy',v.eff)+kv('Temperature',v.temp)+`</div>`).join('');
    }
    const ff = D.quickfacts.filter(f=>match(f[0]+' '+f[1]));
    if(ff.length){
      html+='<div class="res-group">Quick Reference</div>';
      html+=ff.map(f=>`<div class="card"><h3>${hl(f[0],words)}</h3><div style="font-size:14.5px">${hl(f[1],words)}</div></div>`).join('');
    }
    const ins=[]; D.inspect.forEach(s=>s.items.forEach(it=>{ if(match(s.h+' '+it)) ins.push([s.h,it]); }));
    if(ins.length){
      html+='<div class="res-group">Inspection Checklist</div>';
      html+=ins.map(p=>`<div class="card"><div class="muted" style="font-size:12px">${esc(p[0])}</div><div style="font-size:14.5px">${hl(p[1],words)}</div></div>`).join('');
    }
    if(!html) html='<div class="empty">No matches for “'+esc(term)+'”.<br>Try a single keyword like <b>varroa</b>, <b>swarm</b>, or <b>queen</b>.</div>';
    return html;
  }

  // search input
  let t=null;
  q.addEventListener('input',()=>{ clr.classList.toggle('show', !!q.value);
    clearTimeout(t); t=setTimeout(render, 120); });
  clr.onclick=()=>{ q.value=''; clr.classList.remove('show'); render(); q.focus(); };

  // PWA install hint (show on iOS Safari where there's no prompt)
  let showInstallHint=false;
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  if(isIOS && !standalone) showInstallHint=true;

  if('serviceWorker' in navigator){ window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }

  render();
})();
</script>
</body>
</html>
